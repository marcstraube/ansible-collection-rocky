---
name: CI

on:
  push:
    branches: [main]
  pull_request:
    branches: [main]

jobs:
  # =============================================================================
  # LINT (always runs)
  # =============================================================================
  lint:
    name: Ansible Lint
    runs-on: ubuntu-latest
    steps:
      - name: Checkout code
        uses: actions/checkout@v6

      - name: Set up Python
        uses: actions/setup-python@v6
        with:
          python-version: '3.13'

      - name: Install dependencies
        run: |
          pip install ansible-core ansible-lint

      - name: Install collection dependencies
        run: |
          ansible-galaxy collection install marcstraube.common
          ansible-galaxy collection install community.general community.crypto ansible.posix containers.podman

      - name: Run ansible-lint
        run: ansible-lint

  # =============================================================================
  # MARKDOWN LINT (always runs)
  # =============================================================================
  markdown-lint:
    name: Markdown Lint
    runs-on: ubuntu-latest
    steps:
      - name: Checkout code
        uses: actions/checkout@v6

      - name: Run markdownlint
        uses: DavidAnson/markdownlint-cli2-action@v23
        with:
          config: .markdownlint.yml
          globs: '**/*.md'

  # =============================================================================
  # YAML LINT (always runs)
  # =============================================================================
  yaml-lint:
    name: YAML Lint
    runs-on: ubuntu-latest
    steps:
      - name: Checkout code
        uses: actions/checkout@v6

      - name: Set up Python
        uses: actions/setup-python@v6
        with:
          python-version: '3.13'

      - name: Install yamllint
        run: pip install yamllint

      - name: Run yamllint
        run: yamllint -c .yamllint .

  # =============================================================================
  # MOLECULE ROLE TESTS
  # =============================================================================
  molecule-roles:
    name: Molecule ${{ matrix.role }} (${{ matrix.platform }})
    runs-on: ubuntu-latest
    needs: [lint, markdown-lint, yaml-lint]
    if: github.event_name != 'pull_request'
    strategy:
      fail-fast: false
      matrix:
        include:
          - { role: installer, platform: rocky-installer-rocky9 }
          - { role: installer, platform: rocky-installer-rocky10 }

    steps:
      - name: Checkout code
        uses: actions/checkout@v6

      - name: Set up Python
        uses: actions/setup-python@v6
        with:
          python-version: '3.13'

      - name: Install dependencies
        run: |
          pip install "ansible-core~=2.17.0" \
                      molecule \
                      molecule-plugins[podman] \
                      passlib

      - name: Install collection dependencies
        run: |
          ansible-galaxy collection install marcstraube.common
          ansible-galaxy collection install community.general community.crypto ansible.posix containers.podman

      - name: Run Molecule test
        working-directory: roles/${{ matrix.role }}
        run: molecule test
        env:
          MOLECULE_PLATFORM_NAME: ${{ matrix.platform }}
          PY_COLORS: '1'
          ANSIBLE_FORCE_COLOR: '1'

  # =============================================================================
  # BUILD (always runs)
  # =============================================================================
  build:
    name: Build Collection
    runs-on: ubuntu-latest
    needs: [lint, markdown-lint, yaml-lint]
    steps:
      - name: Checkout code
        uses: actions/checkout@v6

      - name: Set up Python
        uses: actions/setup-python@v6
        with:
          python-version: '3.13'

      - name: Install Ansible
        run: pip install ansible-core

      - name: Build collection
        run: ansible-galaxy collection build

      - name: Upload artifact
        uses: actions/upload-artifact@v7
        with:
          name: collection-tarball
          path: '*.tar.gz'
          retention-days: 30
