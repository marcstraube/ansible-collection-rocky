---
name: CI

on:
  push:
    branches: [main]
  pull_request:
    branches: [main]

jobs:
  # =============================================================================
  # LINT (always runs)
  # =============================================================================
  lint:
    name: Ansible Lint
    runs-on: ubuntu-latest
    steps:
      - name: Checkout code
        uses: actions/checkout@v7

      - name: Set up Python
        uses: actions/setup-python@v6
        with:
          python-version: '3.13'

      - name: Install dependencies
        run: |
          pip install ansible-core ansible-lint

      - name: Install collection dependencies
        run: |
          ansible-galaxy collection install marcstraube.common
          ansible-galaxy collection install community.general community.crypto ansible.posix containers.podman

      - name: Run ansible-lint
        run: ansible-lint

  # =============================================================================
  # MARKDOWN LINT (always runs)
  # =============================================================================
  markdown-lint:
    name: Markdown Lint
    runs-on: ubuntu-latest
    steps:
      - name: Checkout code
        uses: actions/checkout@v7

      - name: Run markdownlint
        uses: DavidAnson/markdownlint-cli2-action@v23
        with:
          config: .markdownlint.yml
          globs: '**/*.md'

  # =============================================================================
  # YAML LINT (always runs)
  # =============================================================================
  yaml-lint:
    name: YAML Lint
    runs-on: ubuntu-latest
    steps:
      - name: Checkout code
        uses: actions/checkout@v7

      - name: Set up Python
        uses: actions/setup-python@v6
        with:
          python-version: '3.13'

      - name: Install yamllint
        run: pip install yamllint

      - name: Run yamllint
        run: yamllint -c .yamllint .

  # =============================================================================
  # DETECT CHANGED ROLES
  # Determines which roles need molecule testing based on git diff.
  # Only substantive changes trigger tests (not README-only edits).
  # Shared file changes (galaxy.yml, plugins/, meta/runtime.yml) test all roles.
  # =============================================================================
  detect-changes:
    name: Detect Changed Roles
    runs-on: ubuntu-latest
    outputs:
      has_roles: ${{ steps.set-matrix.outputs.has_roles }}
    steps:
      - name: Checkout code
        uses: actions/checkout@v7
        with:
          fetch-depth: 0

      - name: Determine changed roles
        id: set-matrix
        run: |
          # Determine base commit for diff
          if [ "${{ github.event_name }}" = "pull_request" ]; then
            BASE="${{ github.event.pull_request.base.sha }}"
          elif [ "${{ github.event.before }}" != "0000000000000000000000000000000000000000" ]; then
            BASE="${{ github.event.before }}"
          else
            echo "Initial or force push — testing all roles"
            echo "has_roles=true" >> "$GITHUB_OUTPUT"
            exit 0
          fi

          if [ -z "$BASE" ] || ! git cat-file -e "$BASE" 2>/dev/null; then
            echo "has_roles=true" >> "$GITHUB_OUTPUT"
            exit 0
          fi

          CHANGED=$(git diff --name-only "$BASE" "${{ github.sha }}")

          # Shared files that require testing all roles
          if echo "$CHANGED" | grep -qE '^(galaxy\.yml|requirements\.yml|plugins/|meta/runtime\.yml)'; then
            echo "Shared files changed — testing all roles"
            echo "has_roles=true" >> "$GITHUB_OUTPUT"
            exit 0
          fi

          # Check for substantive role changes (skip README-only)
          ROLES=$(echo "$CHANGED" \
            | grep '^roles/' \
            | grep -v '/README\.md$' \
            | sed 's|^roles/\([^/]*\)/.*|\1|' \
            | sort -u)

          if [ -n "$ROLES" ]; then
            echo "Roles to test: $ROLES"
            echo "has_roles=true" >> "$GITHUB_OUTPUT"
          else
            echo "No roles to test"
            echo "has_roles=false" >> "$GITHUB_OUTPUT"
          fi

  # =============================================================================
  # MOLECULE ROLE TESTS (Rocky 9 + Rocky 10)
  # =============================================================================
  molecule-roles:
    name: Molecule ${{ matrix.role }} (${{ matrix.platform }})
    runs-on: ubuntu-latest
    needs: [lint, markdown-lint, yaml-lint, detect-changes]
    if: needs.detect-changes.outputs.has_roles == 'true'
    strategy:
      fail-fast: false
      matrix:
        include:
          - { role: installer, platform: rocky-installer-rocky9 }
          - { role: installer, platform: rocky-installer-rocky10 }

    steps:
      - name: Checkout code
        uses: actions/checkout@v7

      - name: Set up Python
        uses: actions/setup-python@v6
        with:
          python-version: '3.13'

      - name: Install dependencies
        run: |
          pip install "ansible-core~=2.17.0" \
                      molecule \
                      molecule-plugins[podman] \
                      passlib

      - name: Install collection dependencies
        run: |
          ansible-galaxy collection install marcstraube.common
          ansible-galaxy collection install community.general community.crypto ansible.posix containers.podman

      - name: Run Molecule test
        working-directory: roles/${{ matrix.role }}
        run: molecule test
        env:
          MOLECULE_PLATFORM_NAME: ${{ matrix.platform }}
          PY_COLORS: '1'
          ANSIBLE_FORCE_COLOR: '1'

  # =============================================================================
  # BUILD (always runs)
  # =============================================================================
  build:
    name: Build Collection
    runs-on: ubuntu-latest
    needs: [lint, markdown-lint, yaml-lint]
    steps:
      - name: Checkout code
        uses: actions/checkout@v7

      - name: Set up Python
        uses: actions/setup-python@v6
        with:
          python-version: '3.13'

      - name: Install Ansible
        run: pip install ansible-core

      - name: Build collection
        run: ansible-galaxy collection build

      - name: Upload artifact
        uses: actions/upload-artifact@v7
        with:
          name: collection-tarball
          path: '*.tar.gz'
          retention-days: 30

  # =============================================================================
  # CI GATE (single required check for branch protection)
  # =============================================================================
  ci-gate:
    name: CI Gate
    runs-on: ubuntu-latest
    if: always()
    needs: [lint, markdown-lint, yaml-lint, build, molecule-roles]
    steps:
      - name: Check required job results
        run: |
          results=(
            "${{ needs.lint.result }}"
            "${{ needs.markdown-lint.result }}"
            "${{ needs.yaml-lint.result }}"
            "${{ needs.build.result }}"
            "${{ needs.molecule-roles.result }}"
          )
          for r in "${results[@]}"; do
            if [ "$r" = "failure" ] || [ "$r" = "cancelled" ]; then
              echo "::error::Required job failed or was cancelled: $r"
              exit 1
            fi
          done
          echo "All required jobs passed or were skipped"
